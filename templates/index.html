<!DOCTYPE html>
<html>
<head>
    <title>Tribunal</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="navbar">⚖️ Tribunal</div>

<div class="container">
    
    <h1 class="title">AI Debate Judge</h1>
    <p class="subtitle">Decide with logic. Win with clarity.</p>

    <form action="/analyze" method="POST">
        
        <div class="grid">
            <div class="card neon-green">
                <h2>🟢 Party A</h2>
                <textarea name="argument1" placeholder="Enter argument..."></textarea>
            </div>

            <div class="card neon-red">
                <h2>🔴 Party B</h2>
                <textarea name="argument2" placeholder="Enter argument..."></textarea>
            </div>
        </div>

        <button type="submit" class="analyze-btn">⚡ Analyze Debate</button>
    </form>

    {% if result %}
    <div class="result-card">
        <h2>🏆 Winner</h2>
        <p>{{ result }}</p>

        <div class="scores">
            <div class="bar">
                <span>Logic</span>
                <div class="progress"><div style="width: 80%"></div></div>
            </div>

            <div class="bar">
                <span>Clarity</span>
                <div class="progress"><div style="width: 70%"></div></div>
            </div>

            <div class="bar">
                <span>Persuasion</span>
                <div class="progress"><div style="width: 90%"></div></div>
            </div>
        </div>
    </div>
    {% endif %}

</div>

</body>
</html>
