<!DOCTYPE html>
<html>
<head>
    <title>Tribunal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    ⚖️ Tribunal
</div>

<div class="main">

    <h1>AI Debate Judge</h1>
    <p class="subtitle">Where logic meets intelligence</p>

    <form action="/analyze" method="POST">

        <div class="cards">

            <div class="card green">
                <h2>🟢 Party A</h2>
                <textarea name="argument1" placeholder="Enter argument..."></textarea>
            </div>

            <div class="card red">
                <h2>🔴 Party B</h2>
                <textarea name="argument2" placeholder="Enter argument..."></textarea>
            </div>

        </div>

        <button type="submit">⚡ Analyze Debate</button>

    </form>

    {% if result %}
    <div class="result">
        <h2>🏆 Winner</h2>
        <p>{{ result }}</p>
    </div>
    {% endif %}

</div>

</body>
</html>
