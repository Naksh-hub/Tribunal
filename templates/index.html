<!DOCTYPE html>
<html>
<head>
    <title>Tribunal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    ⚖️ Tribunal
</div>

<!-- MAIN -->
<div class="main">

    <h1>AI Debate Judge</h1>
    <p class="subtitle">Decide with logic. Dominate with clarity.</p>

    <!-- FORM -->
    <form action="/analyze" method="POST">

        <!-- SETUP -->
        <div class="setup">
            <input type="text" name="topic" placeholder="Enter Debate Topic (Agenda)">
            <input type="text" name="teamA" placeholder="Team FOR name">
            <input type="text" name="teamB" placeholder="Team AGAINST name">
        </div>

        <!-- ARGUMENTS -->
        <div class="cards">

            <div class="card green">
                <h2>🟢 Party A (FOR)</h2>
                <textarea name="argument1" placeholder="Enter argument..."></textarea>
            </div>

            <div class="card red">
                <h2>🔴 Party B (AGAINST)</h2>
                <textarea name="argument2" placeholder="Enter argument..."></textarea>
            </div>

        </div>

        <button type="submit">⚡ Analyze Debate</button>

    </form>

    <!-- RESULT SECTION -->
    {% if result %}
    <div class="result">

        <h2>🏆 Winner: {{ result }}</h2>

        <p><strong>Topic:</strong> {{ topic }}</p>

        {% if explanation %}
        <p style="margin-top:10px; color:#ccc;">
            🤖 {{ explanation }}
        </p>
        {% endif %}

        <!-- SCORE SLIDERS -->
        <div style="margin-top:20px;">
            <h3>📊 Judge Evaluation</h3>

            <label>Logic & Evidence</label>
            <input type="range" class="slider" min="0" max="10">

            <label>Rhetoric & Delivery</label>
            <input type="range" class="slider" min="0" max="10">

            <label>Clash (Rebuttal Strength)</label>
            <input type="range" class="slider" min="0" max="10">
        </div>

    </div>
    {% endif %}

</div>

</body>
</html>
